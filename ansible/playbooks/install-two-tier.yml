- name: Running two tier app
  hosts: app
  become: yes
  tasks:
    - name: cloning app
      git:
        repo: https://github.com/arpanelfranklin/Two-tier-Maven-app.git
    - name: docker compose
      docker_compose:
        project_src: ./Two-tier-Macen-app/
        files: "docker-compose.yml"
        state: present
